name: Spark Launcher CI/CD
# Author: SparkyNox
# Builds APK (Android 32/64bit) and IPA (iOS via Capacitor) on push/tag

on:
  push:
    branches: [ main, dev ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options: [ debug, release ]

env:
  JAVA_VERSION: '17'
  ANDROID_COMPILE_SDK: '34'
  ANDROID_BUILD_TOOLS: '34.0.0'

jobs:
  # ─────────────────────────────────────────────
  # ANDROID BUILD
  # ─────────────────────────────────────────────
  build-android:
    name: 🤖 Android Build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: 🔑 Decode Keystore (release only)
        if: github.ref_type == 'tag' || github.event.inputs.build_type == 'release'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: 🔧 Make Gradle executable
        run: chmod +x ./gradlew

      - name: 🔎 Lint
        run: ./gradlew lint
        continue-on-error: true

      - name: 🧪 Unit Tests
        run: ./gradlew test
        continue-on-error: true

      - name: 🏗️ Build Debug APK (universal + per-ABI)
        if: github.ref_type != 'tag' && github.event.inputs.build_type != 'release'
        run: |
          ./gradlew assembleDebug
        env:
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}

      - name: 🏗️ Build Release APK (universal + per-ABI)
        if: github.ref_type == 'tag' || github.event.inputs.build_type == 'release'
        run: |
          ./gradlew assembleRelease
        env:
          KEYSTORE_PATH: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}

      - name: 📋 List APK outputs
        run: find app/build/outputs/apk -name "*.apk" | sort

      - name: 📤 Upload Debug APKs
        if: github.ref_type != 'tag' && github.event.inputs.build_type != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: SparkLauncher-debug-apks
          path: |
            app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: 📤 Upload Release APKs
        if: github.ref_type == 'tag' || github.event.inputs.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: SparkLauncher-release-apks
          path: |
            app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: 🚀 Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/app-universal-release.apk
            app/build/outputs/apk/release/app-arm64-v8a-release.apk
            app/build/outputs/apk/release/app-armeabi-v7a-release.apk
            app/build/outputs/apk/release/app-x86_64-release.apk
            app/build/outputs/apk/release/app-x86-release.apk
          name: "Spark Launcher ${{ github.ref_name }}"
          body: |
            ## 🔥 Spark Launcher ${{ github.ref_name }}
            **Author:** SparkyNox

            ### Downloads
            | File | Architecture |
            |------|-------------|
            | app-universal-release.apk | All devices (fat APK) |
            | app-arm64-v8a-release.apk | 64-bit ARM (most modern phones) |
            | app-armeabi-v7a-release.apk | 32-bit ARM (older phones) |
            | app-x86_64-release.apk | 64-bit x86 (emulators) |
            | app-x86-release.apk | 32-bit x86 (emulators) |

            ### What's New
            See CHANGELOG.md for full details.
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # iOS BUILD (via Capacitor wrapper)
  # ─────────────────────────────────────────────
  build-ios:
    name: 🍎 iOS Build
    runs-on: macos-latest
    if: github.ref_type == 'tag' || github.event.inputs.build_type == 'release'
    needs: build-android

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js (Capacitor)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ios-wrapper/package-lock.json

      - name: 📦 Install Capacitor deps
        working-directory: ios-wrapper
        run: npm ci

      - name: 🔑 Install Apple Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_CERT_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A \
            -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: 🏗️ Build iOS IPA
        working-directory: ios-wrapper
        run: |
          npx cap sync ios
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/SparkLauncher.xcarchive \
            -destination generic/platform=iOS \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/SparkLauncher.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/ipa

      - name: 📤 Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SparkLauncher-ios
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 90

      - name: 🚀 Add IPA to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/ipa/*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # NOTIFY
  # ─────────────────────────────────────────────
  notify:
    name: 📣 Discord Notify
    runs-on: ubuntu-latest
    needs: [ build-android ]
    if: always() && github.ref_type == 'tag'
    steps:
      - name: Notify Discord
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          title: "Spark Launcher ${{ github.ref_name }} Released!"
          description: |
            APK builds are ready.
            Download from the [GitHub Release](https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }})
          color: 0xf77f00
          username: "Spark Launcher CI"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
